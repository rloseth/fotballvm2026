name: Update Matches and Deploy to Pages

on:
  push:
    branches:
      - main # Eller master, hvis du bruker det
  schedule:
    - cron: "17 19,21,23,1,3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run TV2 Scraper
        run: python world_cup_scraper.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
